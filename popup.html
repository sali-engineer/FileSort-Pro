<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileSort Pro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 360px;
    min-height: 480px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: #f0f0f5;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 18px 20px 14px;
    border-bottom: 1px solid #ffffff12;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #6c63ff, #3ecfcf);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: #fff;
  }

  .logo-text p {
    font-size: 10px;
    color: #8888aa;
    margin-top: 1px;
  }

  /* Toggle */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle-label {
    font-size: 11px;
    color: #8888aa;
  }

  .toggle {
    position: relative;
    width: 38px;
    height: 21px;
  }

  .toggle input { display: none; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #333355;
    border-radius: 21px;
    cursor: pointer;
    transition: 0.3s;
  }

  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 15px; height: 15px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: 0.3s;
  }

  input:checked + .toggle-slider { background: linear-gradient(135deg, #6c63ff, #3ecfcf); }
  input:checked + .toggle-slider:before { transform: translateX(17px); }

  /* Tabs */
  .tabs {
    display: flex;
    background: #0f0f13;
    border-bottom: 1px solid #ffffff10;
  }

  .tab {
    flex: 1;
    padding: 10px;
    font-size: 12px;
    font-weight: 600;
    color: #666688;
    text-align: center;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: 0.2s;
    letter-spacing: 0.3px;
  }

  .tab.active {
    color: #a89dff;
    border-bottom-color: #6c63ff;
  }

  /* Panel */
  .panel { display: none; padding: 14px 16px; }
  .panel.active { display: block; }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .stat-card {
    background: #1a1a2e;
    border: 1px solid #ffffff0d;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-number {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #6c63ff, #3ecfcf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-label {
    font-size: 10px;
    color: #666688;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Section title */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: #666688;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  /* History list */
  .history-list { display: flex; flex-direction: column; gap: 6px; }

  .history-item {
    background: #1a1a2e;
    border: 1px solid #ffffff0d;
    border-radius: 8px;
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .history-icon { font-size: 16px; flex-shrink: 0; }

  .history-info { flex: 1; overflow: hidden; }

  .history-name {
    font-size: 12px;
    font-weight: 600;
    color: #e0e0f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-folder {
    font-size: 10px;
    color: #6c63ff;
    margin-top: 2px;
  }

  .history-time {
    font-size: 10px;
    color: #444466;
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: #444466;
  }

  .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-state p { font-size: 12px; line-height: 1.6; }

  /* Rules list */
  .rules-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }

  .rule-item {
    background: #1a1a2e;
    border: 1px solid #ffffff0d;
    border-radius: 8px;
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .rule-icon { font-size: 16px; flex-shrink: 0; }

  .rule-info { flex: 1; }

  .rule-name {
    font-size: 12px;
    font-weight: 600;
    color: #e0e0f0;
  }

  .rule-folder {
    font-size: 10px;
    color: #3ecfcf;
    margin-top: 2px;
  }

  .rule-toggle {
    width: 30px; height: 17px;
    position: relative;
  }

  .rule-toggle input { display: none; }

  .rule-slider {
    position: absolute;
    inset: 0;
    background: #333355;
    border-radius: 17px;
    cursor: pointer;
    transition: 0.3s;
  }

  .rule-slider:before {
    content: '';
    position: absolute;
    width: 11px; height: 11px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: 0.3s;
  }

  input:checked + .rule-slider { background: #6c63ff; }
  input:checked + .rule-slider:before { transform: translateX(13px); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333355; border-radius: 4px; }

  /* Footer */
  .footer {
    padding: 10px 16px;
    border-top: 1px solid #ffffff08;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text { font-size: 10px; color: #444466; }

  .clear-btn {
    font-size: 10px;
    color: #6c63ff;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: 0.2s;
  }

  .clear-btn:hover { background: #6c63ff22; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🗂️</div>
    <div class="logo-text">
      <h1>FileSort Pro</h1>
      <p>Auto-organizes your downloads</p>
    </div>
  </div>
  <div class="toggle-wrap">
    <span class="toggle-label" id="toggleLabel">ON</span>
    <label class="toggle">
      <input type="checkbox" id="masterToggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="activity">Activity</div>
  <div class="tab" data-tab="rules">Rules</div>
</div>

<!-- Activity Panel -->
<div class="panel active" id="activity">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="totalSorted">0</div>
      <div class="stat-label">Files Sorted</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalFolders">0</div>
      <div class="stat-label">Folders Used</div>
    </div>
  </div>

  <div class="section-title">Recent Activity</div>
  <div class="history-list" id="historyList">
    <div class="empty-state">
      <div class="empty-icon">📥</div>
      <p>No files sorted yet.<br>Download something and FileSort Pro<br>will organize it automatically!</p>
    </div>
  </div>
</div>

<!-- Rules Panel -->
<div class="panel" id="rules">
  <div class="section-title" style="margin-bottom:10px">Sorting Rules</div>
  <div class="rules-list" id="rulesList"></div>
</div>

<!-- Footer -->
<div class="footer">
  <span class="footer-text">FileSort Pro v1.0</span>
  <button class="clear-btn" id="clearBtn">Clear history</button>
</div>

<script src="popup.js"></script>
</body>
</html>
